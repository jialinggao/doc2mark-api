version: '3.8'

name: doc2mark-api

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    container_name: doc2mark-api-api
    ports:
      - "5926:5926"
    env_file:
      - .env
    volumes:
      - ./volumes/logs:/app/logs
      - ./volumes/temp:/app/temp
    depends_on:
      - redis
    restart: unless-stopped
    command: python -m app.main

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
      # 如需GPU加速，将上面改为：dockerfile: docker/Dockerfile.worker.gpu
      # 并取消下面 deploy 部分的注释
    container_name: doc2mark-api-worker
    env_file:
      - .env
    volumes:
      - ./volumes/logs:/app/logs
      - ./volumes/temp:/app/temp
      - ./volumes/paddlex:/root/.paddlex
    depends_on:
      - redis
    restart: unless-stopped
    command: python -m app.run_worker
    # GPU版本取消下面注释
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  redis:
    image: redis:8.8-alpine
    container_name: doc2mark-api-redis
    volumes:
      - ./volumes/redis:/data
    restart: unless-stopped

volumes:
  redis_data:
